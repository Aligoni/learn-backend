# Local Docker workflow:
#   docker compose up --build
#
# Swagger UI: http://localhost:3000/api
#
# `./data` is bind-mounted so SQLite matches your repo’s ./data folder. After the API has
# started once (schema sync when NODE_ENV=development), seed from the host:
#   DATABASE_PATH=./data/app.sqlite yarn seed
#
# For production (NODE_ENV=production), TypeORM synchronize is off — use migrations.

services:
  api:
    build: .
    ports:
      - "${PORT:-3000}:3000"
    environment:
      NODE_ENV: "${NODE_ENV:-development}"
      PORT: "${PORT:-3000}"
      DATABASE_PATH: /app/data/app.sqlite
      JWT_SECRET: "${JWT_SECRET:-change-me-to-a-long-random-string-for-docker-only}"
      JWT_EXPIRES_IN: "${JWT_EXPIRES_IN:-7d}"
    volumes:
      - ./data:/app/data
